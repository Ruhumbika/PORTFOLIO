<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title description">
  <title id="title">Ruhumbika portfolio icon</title>
  <desc id="description">R monogram inside a teal security shield</desc>
  <defs>
    <linearGradient id="background" x1="8" y1="5" x2="57" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111b24" />
      <stop offset="1" stop-color="#070b10" />
    </linearGradient>
    <linearGradient id="shield" x1="19" y1="10" x2="47" y2="53" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" stop-opacity="0.3" />
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0.08" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#background)" />
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#263640" stroke-width="2" />

  <path
    d="M32 7.5 50 14v14.2c0 12.1-7.3 21.8-18 28.3-10.7-6.5-18-16.2-18-28.3V14z"
    fill="url(#shield)"
    stroke="#14b8a6"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <g fill="none" stroke="#f8fffe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 44V20h10.4c6 0 9.6 3 9.6 8s-3.6 8-9.6 8H23" />
    <path d="m34 36 10 10" />
  </g>

  <circle cx="49" cy="15" r="3" fill="#2dd4bf" filter="url(#glow)" />
  <circle cx="49" cy="15" r="1.1" fill="#eafffb" />
</svg>
